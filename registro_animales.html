<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Animales</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{ background:#eef2f7; }
.card{ border-radius:15px; }
</style>
</head>

<body class="p-4">

<div class="container">

<h2 class="text-center mb-4">🐄 Registro de Animales</h2>

<div class="card p-4 shadow">

<form id="formAnimal">

<div class="row mb-3">
    <div class="col-md-3">
        <label>Nombre</label>
        <input type="text" id="nombre" class="form-control" required>
    </div>

    <div class="col-md-3">
        <label>Número</label>
        <input type="text" id="numero" class="form-control" required>
    </div>

    <div class="col-md-2">
        <label>Sexo</label>
        <select id="sexo" class="form-control">
            <option value="H">Hembra</option>
            <option value="M">Macho</option>
        </select>
    </div>

    <div class="col-md-2">
        <label>Raza</label>
        <input type="text" id="raza" class="form-control">
    </div>

    <div class="col-md-2">
        <label>Peso</label>
        <input type="number" id="peso" class="form-control">
    </div>
</div>

<div class="row mb-3">
    <div class="col-md-3">
        <label>Fecha Nacimiento</label>
        <input type="date" id="fecha" class="form-control">
    </div>

    <div class="col-md-3">
        <label>Estado de Salud</label>
        <input type="text" id="salud" class="form-control">
    </div>
</div>

<button type="button" class="btn btn-success" onclick="guardarAnimal()">
Guardar Animal
</button>

</form>

</div>

</div>

<script>

function guardarAnimal(){

let datos = new FormData();

datos.append("nombre", document.getElementById("nombre").value);
datos.append("numero", document.getElementById("numero").value);
datos.append("sexo", document.getElementById("sexo").value);
datos.append("raza", document.getElementById("raza").value);
datos.append("peso", document.getElementById("peso").value);
datos.append("fecha_nacimiento", document.getElementById("fecha").value);
datos.append("estado_salud", document.getElementById("salud").value);

fetch("guardar_animal.php", {
method:"POST",
body:datos
})
.then(r=>r.text())
.then(r=>{
    if(r.trim()=="ok"){
        alert("✅ Animal guardado correctamente");
        document.getElementById("formAnimal").reset();
    }else{
        alert("❌ Error: " + r);
    }
});

}

</script>

</body>
</html>
