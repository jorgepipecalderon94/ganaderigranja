<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Inventario Ganadero</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{ background:#eef2f7; }
.card{ border-radius: 15px; }
.table thead{ background:#198754; color:white; }
.btn-rounded{ border-radius:30px; }
</style>

</head>

<body class="p-4">

<div class="container">

    <h2 class="text-center mb-4">🐄 Registro de Inventario Ganadero</h2>

    <div class="card p-4 shadow">

        <h4 class="mb-3">Formulario</h4>

        <form id="formInventario">

            <div class="row mb-3">
                <div class="col-md-4">
                    <label>Fecha del Inventario</label>
                    <input type="date" class="form-control" id="fecha" required>
                </div>
            </div>

            <h5>Inventario del Ganado</h5>

            <div class="row mb-3">
                <div class="col-md-3">
                    <label>Vacas en Producción</label>
                    <input type="number" class="form-control item" id="produccion" min="0" value="0">
                </div>
                <div class="col-md-3">
                    <label>Crías Hembras</label>
                    <input type="number" class="form-control item" id="hembras" min="0" value="0">
                </div>
                <div class="col-md-3">
                    <label>Crías Macho</label>
                    <input type="number" class="form-control item" id="machos" min="0" value="0">
                </div>
                <div class="col-md-3">
                    <label>Terneros Destetos</label>
                    <input type="number" class="form-control item" id="destetos" min="0" value="0">
                </div>

                <div class="col-md-3 mt-3">
                    <label>Vacas en Descanso</label>
                    <input type="number" class="form-control item" id="descanso" min="0" value="0">
                </div>
                <div class="col-md-3 mt-3">
                    <label>Vacas Horra</label>
                    <input type="number" class="form-control item" id="horra" min="0" value="0">
                </div>
                <div class="col-md-3 mt-3">
                    <label>Novillas de Vientre</label>
                    <input type="number" class="form-control item" id="vientre" min="0" value="0">
                </div>
                <div class="col-md-3 mt-3">
                    <label>Novillas de Levante</label>
                    <input type="number" class="form-control item" id="levante" min="0" value="0">
                </div>

                <div class="col-md-3 mt-3">
                    <label>Toros</label>
                    <input type="number" class="form-control item" id="toros" min="0" value="0">
                </div>
            </div>

            <div class="mb-3">
                <label>Total de Animales</label>
                <input type="number" class="form-control" id="total" readonly>
            </div>

            <div class="mb-3">
                <label>Observaciones</label>
                <textarea class="form-control" id="observaciones" rows="3"></textarea>
            </div>

            <button type="button" class="btn btn-success btn-rounded" onclick="agregarInventario()">➕ Agregar Registro</button>

        </form>

    </div>

    <div class="card mt-4 p-4 shadow">
        <h4>Registros Guardados</h4>

        <table class="table mt-3" id="tablaInventario">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Producción</th>
                    <th>Hembras</th>
                    <th>Machos</th>
                    <th>Destetos</th>
                    <th>Descanso</th>
                    <th>Horra</th>
                    <th>Vientre</th>
                    <th>Levante</th>
                    <th>Toros</th>
                    <th>Total</th>
                    <th>Observaciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <button class="btn btn-primary btn-rounded me-2" onclick="descargarExcel()">📊 Exportar Excel</button>
        <button class="btn btn-danger btn-rounded" onclick="descargarPDF()">📄 Exportar PDF</button>
    </div>

</div>

<!-- LIBRERÍAS -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

// Calcular total automáticamente
document.querySelectorAll(".item").forEach(i => {
    i.addEventListener("input", calcularTotal);
});

function calcularTotal() {
    let total = 0;
    document.querySelectorAll(".item").forEach(i => total += Number(i.value));
    document.getElementById("total").value = total;
}

// Agregar registro a la tabla
function agregarInventario(){

calcularTotal();

let datos = new FormData();

datos.append("fecha", fecha.value);
datos.append("produccion", produccion.value);
datos.append("hembras", hembras.value);
datos.append("machos", machos.value);
datos.append("destetos", destetos.value);
datos.append("descanso", descanso.value);
datos.append("horra", horra.value);
datos.append("vientre", vientre.value);
datos.append("levante", levante.value);
datos.append("toros", toros.value);
datos.append("total", total.value);
datos.append("observaciones", observaciones.value);

fetch("guardar_inventario.php", {
method:"POST",
body:datos
})
.then(r=>r.text())
.then(r=>{

if(r.trim()=="ok"){

alert(" Guardado en base de datos");

const tabla = document.querySelector("#tablaInventario tbody");

const fila = `
<tr>
<td>${fecha.value}</td>
<td>${produccion.value}</td>
<td>${hembras.value}</td>
<td>${machos.value}</td>
<td>${destetos.value}</td>
<td>${descanso.value}</td>
<td>${horra.value}</td>
<td>${vientre.value}</td>
<td>${levante.value}</td>
<td>${toros.value}</td>
<td>${total.value}</td>
<td>${observaciones.value}</td>
</tr>
`;

tabla.innerHTML += fila;

document.getElementById("formInventario").reset();
total.value = 0;

}else{
alert(" Error: " + r);
}

});
}

// Exportar a Excel
function descargarExcel(){
    const tabla = document.getElementById("tablaInventario");
    const wb = XLSX.utils.table_to_book(tabla);
    XLSX.writeFile(wb, "Inventario_Ganadero.xlsx");
}

// Exportar a PDF
function descargarPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: "landscape" });

    doc.text("Inventario Ganadero", 10, 10);
    doc.html(document.getElementById("tablaInventario"), {
        callback: function () { doc.save("Inventario_Ganadero.pdf"); },
        x: 10, y: 20
    });
}
</script>

</body>
</html>
