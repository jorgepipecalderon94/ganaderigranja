<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Usuario</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card p-4 shadow">

<h3 class="text-center">Registro de Usuario</h3>

<form id="formRegistro">

<div class="mb-3">
<label>Nombre</label>
<input type="text" class="form-control" id="nombre" required>
</div>

<div class="mb-3">
<label>Apellido</label>
<input type="text" class="form-control" id="apellido" required>
</div>

<div class="mb-3">
<label>Documento</label>
<input type="text" class="form-control" id="documento" required>
</div>

<div class="mb-3">
<label>Correo</label>
<input type="email" class="form-control" id="correo" required>
</div>

<div class="mb-3">
<label>Contraseña</label>
<input type="password" class="form-control" id="password" required>
</div>

<div class="mb-3">
<label>Rol</label>
<select class="form-control" id="rol" required>
<option value="">Seleccione</option>
<option value="profesor">Profesor</option>
<option value="estudiante">Estudiante</option>
<option value="operario">Operario</option>
</select>
</div>

<div class="text-center">
<button type="submit" class="btn btn-success">
Registrar Usuario
</button>
</div>

</form>

</div>
</div>

<script>

document.getElementById("formRegistro").addEventListener("submit", function(e){

e.preventDefault();

// CAPTURA 
let nombre = document.getElementById("nombre").value.trim();
let apellido = document.getElementById("apellido").value.trim();
let documento = document.getElementById("documento").value.trim();
let correo = document.getElementById("correo").value.trim().toLowerCase();
let password = document.getElementById("password").value.trim();
let rol = document.getElementById("rol").value;

// VALIDACIÓN en esta valida los datos 
if(nombre === "" || apellido === "" || documento === "" || correo === "" || password === "" || rol === ""){
    alert("⚠️ Debe llenar TODOS los campos");
    return;
}

// OBTENER USUARIOS
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

// 🔥 VALIDAR CORREO REPETIDO (BIEN HECHO)
let existe = usuarios.some(u => u.correo.toLowerCase().trim() === correo);
if(existe){
    alert("❌ Este correo ya está registrado");
    return;
}

// CREAR USUARIO
let usuario = {
    nombre,
    apellido,
    documento,
    correo,
    password,
    rol,
    bloqueado: false
};

// GUARDAR
usuarios.push(usuario);
localStorage.setItem("usuarios", JSON.stringify(usuarios));

alert("✅ Usuario registrado correctamente");

// REDIRECCIÓN
window.location.href = "ingreso_sistema.html";

});

</script>

</body>
</html>
