<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Sanitario - Sistema Ganadero</title>
    

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background:#f4f6f9; }
        .card { border-radius:15px; box-shadow:0 3px 12px rgba(0,0,0,0.1); }
        .btn-modern { border-radius:30px; padding:10px 20px; }
        .table thead { background:#154c9d; color:white; }
    </style>
</head>

<body>

<!-- ENCABEZADO -->
<div class="bg-success text-white text-center py-3">
    <img src="imagen/logo.png" width="80"><br>
    <h5 class="mb-1">INSTITUCIÓN EDUCATIVA AGROTÉCNICO MIXTO</h5>
    <p class="mb-0">
        NIT: 800122064-7 | Municipio: Belén de los Andaquíes
        INGENIERO de software Jorge Calderon Martinez 
    </p>
</div>  

<div class="container mt-5">

    <h2 class="text-center mb-4">Registro de Evento Sanitario</h2>

    <!-- FORMULARIO -->
    <div class="card p-4 mb-4">
        <h5 class="mb-3">Ingresar datos del evento</h5>

        <div class="row">

            <div class="col-md-4 mb-3">
                <label>Fecha</label>
                <input id="fecha" type="date" class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>Evento sanitario</label>
                <select id="evento" class="form-select">
                    <option value="">Seleccione evento</option>
                    <option>Vacunación</option>
                    <option>Desparasitación</option>
                    <option>Vitaminas</option>
                    <option>Antibiótico</option>
                    <option>Control veterinario</option>
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <label>Producto utilizado</label>
                <input id="producto" type="text" class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>Dosis</label>
                <input id="dosis" type="text" class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>N° animales tratados</label>
                <input id="cantidad" type="number" class="form-control" min="1">
            </div>

            <div class="col-md-12 mb-3">
                <label>Observaciones</label>
                <textarea id="observaciones" class="form-control"></textarea>
            </div>
        </div>

        <button class="btn btn-primary btn-modern" onclick="agregar()">➕ Agregar</button>
        <button class="btn btn-success btn-modern" onclick="guardarCambios()" id="btnGuardar" style="display:none;">💾 Guardar cambios</button>
    </div>

    <!-- TABLA -->
    <div class="card p-4">
        <h5 class="mb-3">Datos registrados</h5>

        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Evento</th>
                    <th>Producto</th>
                    <th>Dosis</th>
                    <th>Cantidad</th>
                    <th>Observaciones</th>
                    <th>Opciones</th>
                </tr>
            </thead>
            <tbody id="tablaCuerpo"></tbody>
        </table>

        <div class="mt-3">
            <button class="btn btn-outline-danger btn-modern" onclick="exportarPDF()">📄 PDF</button>
            <button class="btn btn-outline-success btn-modern" onclick="exportarExcel()">📊 Excel</button>
        </div>
    </div>

</div>

<!-- LIBRERÍAS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let registros = JSON.parse(localStorage.getItem("regSanitario")) || [];
let editIndex = null;

mostrarTabla();

function agregar() {

    let fecha = document.getElementById("fecha").value.trim();
    let evento = document.getElementById("evento").value.trim();
    let producto = document.getElementById("producto").value.trim();
    let dosis = document.getElementById("dosis").value.trim();
    let cantidad = document.getElementById("cantidad").value.trim();
    let observaciones = document.getElementById("observaciones").value.trim();

    if (!fecha || !evento || !producto || !dosis || !cantidad || !observaciones) {
        alert("⚠️ Debe llenar TODOS los campos");
        return;
    }

    registros.push({ fecha, evento, producto, dosis, cantidad, observaciones });
    localStorage.setItem("regSanitario", JSON.stringify(registros));

    alert("✅ Registro guardado");

    mostrarTabla();
    limpiar();
}

function mostrarTabla() {
    let html = "";

    registros.forEach((r, i) => {
        html += `
        <tr>
            <td>${r.fecha}</td>
            <td>${r.evento}</td>
            <td>${r.producto}</td>
            <td>${r.dosis}</td>
            <td>${r.cantidad}</td>
            <td>${r.observaciones}</td>
            <td>
                <button class="btn btn-warning btn-sm" onclick="editar(${i})">Editar</button>
                <button class="btn btn-danger btn-sm" onclick="eliminar(${i})">Eliminar</button>
            </td>
        </tr>`;
    });

    document.getElementById("tablaCuerpo").innerHTML = html;
}

function editar(i) {
    editIndex = i;
    let r = registros[i];

    document.getElementById("fecha").value = r.fecha;
    document.getElementById("evento").value = r.evento;
    document.getElementById("producto").value = r.producto;
    document.getElementById("dosis").value = r.dosis;
    document.getElementById("cantidad").value = r.cantidad;
    document.getElementById("observaciones").value = r.observaciones;

    document.getElementById("btnGuardar").style.display = "inline-block";
}

function guardarCambios() {
    registros[editIndex] = {
        fecha: document.getElementById("fecha").value,
        evento: document.getElementById("evento").value,
        producto: document.getElementById("producto").value,
        dosis: document.getElementById("dosis").value,
        cantidad: document.getElementById("cantidad").value,
        observaciones: document.getElementById("observaciones").value
    };

    localStorage.setItem("regSanitario", JSON.stringify(registros));
    mostrarTabla();
    limpiar();

    document.getElementById("btnGuardar").style.display = "none";
}

function eliminar(i) {
    registros.splice(i, 1);
    localStorage.setItem("regSanitario", JSON.stringify(registros));
    mostrarTabla();
}

function limpiar() {
    document.getElementById("fecha").value = "";
    document.getElementById("evento").value = "";
    document.getElementById("producto").value = "";
    document.getElementById("dosis").value = "";
    document.getElementById("cantidad").value = "";
    document.getElementById("observaciones").value = "";
}

async function exportarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.text("Registro Sanitario", 10, 10);

    let y = 20;
    registros.forEach(r => {
        doc.text(`Fecha: ${r.fecha} | Evento: ${r.evento}`, 10, y);
        y += 10;
        doc.text(`Producto: ${r.producto} | Dosis: ${r.dosis} | Cant: ${r.cantidad}`, 10, y);
        y += 10;
        doc.text(`Obs: ${r.observaciones}`, 10, y);
        y += 15;
    });

    doc.save("registro_sanitario.pdf");
}

function exportarExcel() {
    let hoja = XLSX.utils.json_to_sheet(registros);
    let libro = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(libro, hoja, "Sanitario");
    XLSX.writeFile(libro, "registro_sanitario.xlsx");
}
</script>

</body>
</html>
