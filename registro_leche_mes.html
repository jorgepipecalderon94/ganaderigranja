<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Producción de Leche 2024</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{ background:#eef2f7; }
.card{ border-radius: 15px; }
.table thead{ background:#0d6efd; color:white; }
.btn-rounded{ border-radius:30px; }
</style>

</head>

<body class="p-4">

<div class="container">

    <h2 class="text-center mb-4">🥛 Registro de Producción de Leche - 2024</h2>

    <!-- FORMULARIO -->
    <div class="card p-4 shadow">

        <h4 class="mb-3">Formulario de Registro</h4>

        <form id="formLeche">

            <div class="row">

                <!-- Generador de campos por mes -->
                <script>
                    const meses = [
                        "Enero","Febrero","Marzo","Abril","Mayo","Junio",
                        "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"
                    ];
                </script>

                <!-- Campos -->
                <div class="row">
                    <script>
                        document.write(`
                        ${meses.map((m,i)=>`
                            <div class="col-md-3 mb-3">
                                <label>${m} (Litros)</label>
                                <input type="number" id="mes${i}" class="form-control litros" min="0" value="0">
                            </div>
                        `).join("")}
                        `);
                    </script>
                </div>

            </div>

            <div class="mt-3">
                <label>Total Anual (Litros)</label>
                <input type="number" id="totalAnual" class="form-control" readonly>
            </div>

            <button type="button" class="btn btn-success btn-rounded mt-3" onclick="agregarRegistro()">➕ Agregar Registro</button>

        </form>
    </div>

    <!-- TABLA -->
    <div class="card mt-4 p-4 shadow">

        <h4>Registros Guardados</h4>

        <table class="table mt-3" id="tablaLeche">
            <thead>
                <tr>
                    ${meses.map(m=>`<th>${m}</th>`).join("")}
                    <th>Total</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <button class="btn btn-primary btn-rounded me-2" onclick="descargarExcel()">📊 Exportar Excel</button>
        <button class="btn btn-danger btn-rounded" onclick="descargarPDF()">📄 Exportar PDF</button>

    </div>

</div>

<!-- LIBRERÍAS -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

// Calcular total anual automáticamente
document.querySelectorAll(".litros").forEach(input => {
    input.addEventListener("input", calcularTotal);
});

function calcularTotal(){
    let total = 0;
    document.querySelectorAll(".litros").forEach(i => total += Number(i.value));
    document.getElementById("totalAnual").value = total;
}

// Agregar registro
function agregarRegistro() {
    calcularTotal();

    const tabla = document.querySelector("#tablaLeche tbody");
    const fila = document.createElement("tr");

    let data = "";
    for (let i = 0; i < 12; i++) {
        data += `<td>${document.getElementById("mes"+i).value}</td>`;
    }

    data += `<td>${totalAnual.value}</td>`;
    fila.innerHTML = data;

    tabla.appendChild(fila);
}

// Descargar Excel
function descargarExcel(){
    const tabla = document.getElementById("tablaLeche");
    const wb = XLSX.utils.table_to_book(tabla);
    XLSX.writeFile(wb, "Produccion_Leche_2024.xlsx");
}

// Descargar PDF
function descargarPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: "landscape" });

    doc.text("Registro Producción de Leche - 2024", 10, 10);

    doc.html(document.getElementById("tablaLeche"), {
        callback: function () { doc.save("Produccion_Leche_2024.pdf"); },
        x: 10, y: 20
    });
}

</script>

</body>
</html>
