<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Crías - Ganado Bovino</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{ background:#eef2f7; }
.card{ border-radius: 15px; }
.table thead{ background:#0d6efd; color:white; }
.btn-rounded{ border-radius:30px; }
</style>

</head>

<body class="p-4">

<div class="container">

<h2 class="text-center mb-4">🐮 REGISTRO DE CRÍAS</h2>

<div class="card p-4 shadow">

<h4>Formulario</h4>

<!-- FORMULARIO CORREGIDO -->
<form id="formCrias">

<div class="row mb-3">
    <div class="col-md-3">
        <label>Nombre</label>
        <input type="text" id="nombre" name="nombre" class="form-control">
    </div>

    <div class="col-md-3">
        <label>Fecha nacimiento</label>
        <input type="date" id="fechaNacimiento" name="fecha_nacimiento" class="form-control">
    </div>

    <div class="col-md-2">
        <label>Sexo</label>
        <select id="sexo" name="sexo" class="form-control">
            <option value="M">M</option>
            <option value="H">H</option>
        </select>
    </div>

    <div class="col-md-2">
        <label>Madre</label>
        <input type="text" id="madre" name="madre" class="form-control">
    </div>

    <div class="col-md-2">
        <label>Padre</label>
        <input type="text" id="padre" name="padre" class="form-control">
    </div>
</div>

<div class="row mb-3">
    <div class="col-md-3">
        <label>Peso nacimiento</label>
        <input type="number" id="pesoNacimiento" name="peso_nacimiento" class="form-control">
    </div>

    <div class="col-md-3">
        <label>Fecha destete</label>
        <input type="date" id="fechaDestete" name="fecha_destete" class="form-control">
    </div>

    <div class="col-md-3">
        <label>Peso destete</label>
        <input type="number" id="pesoDestete" name="peso_destete" class="form-control">
    </div>

    <div class="col-md-3">
        <label>Observaciones</label>
        <input type="text" id="observaciones" name="observaciones" class="form-control">
    </div>
</div>

<button type="button" class="btn btn-success" onclick="agregarRegistro()">
Guardar
</button>

</form>

</div>

<!-- TABLA -->
<div class="card mt-4 p-4 shadow">
<h4>Registros</h4>

<table class="table" id="tablaCrias">
<thead>
<tr>
<th>Nombre</th>
<th>Fecha</th>
<th>Sexo</th>
<th>Madre</th>
<th>Padre</th>
<th>Peso N</th>
<th>Fecha D</th>
<th>Peso D</th>
<th>Obs</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

</div>

<script>
function agregarRegistro(){

let nombre = document.getElementById("nombre").value;
let fecha = document.getElementById("fechaNacimiento").value;
let sexo = document.getElementById("sexo").value;

if(nombre == "" || fecha == "" || sexo == ""){
    alert("⚠️ Complete los campos obligatorios");
    return;
}

let datos = new FormData();

datos.append("nombre", nombre);
datos.append("fecha_nacimiento", fecha);
datos.append("sexo", sexo);
datos.append("madre", document.getElementById("madre").value);
datos.append("padre", document.getElementById("padre").value);
datos.append("peso_nacimiento", document.getElementById("pesoNacimiento").value || 0);
datos.append("fecha_destete", document.getElementById("fechaDestete").value);
datos.append("peso_destete", document.getElementById("pesoDestete").value || 0);
datos.append("observaciones", document.getElementById("observaciones").value);

fetch("guardar_crias.php", {
method:"POST",
body:datos
})
.then(r=>r.text())
.then(r=>{
console.log("RESPUESTA:", r);

if(r.trim()=="ok"){
alert("✅ Guardado correctamente");

let tabla = document.querySelector("#tablaCrias tbody");

let fila = `
<tr>
<td>${nombre}</td>
<td>${fecha}</td>
<td>${sexo}</td>
<td>${document.getElementById("madre").value}</td>
<td>${document.getElementById("padre").value}</td>
<td>${document.getElementById("pesoNacimiento").value}</td>
<td>${document.getElementById("fechaDestete").value}</td>
<td>${document.getElementById("pesoDestete").value}</td>
<td>${document.getElementById("observaciones").value}</td>
</tr>
`;

tabla.innerHTML += fila;

document.getElementById("formCrias").reset();

}else{
alert("❌ Error: " + r);
}
});
}
// EXPORTAR EXCEL
function descargarExcel(){
    const tabla = document.getElementById("tablaCrias");
    const wb = XLSX.utils.table_to_book(tabla);
    XLSX.writeFile(wb, "Registro_Crias.xlsx");
}

// EXPORTAR PDF
function descargarPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: "landscape" });

    doc.text("Registro de Crías - Ganado Bovino", 10, 10);

    doc.html(document.getElementById("tablaCrias"), {
        callback: function () { doc.save("Crias_Ganado.pdf"); },
        x: 10, y: 20
    });
}

</script>

</body>
</html>
