<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestionar Usuarios</title>
<link href="css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h3>Gestión de Usuarios</h3>

<table class="table table-bordered">
<thead>
<tr>
<th>Usuario</th>
<th>Rol</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaUsuarios"></tbody>

</table>

<script>

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

function mostrarUsuarios(){
let tabla = document.getElementById("tablaUsuarios");
tabla.innerHTML = "";

usuarios.forEach((user, index) => {
tabla.innerHTML += `
<tr>
<td>${user.correo}</td> <!-- 🔥 AQUÍ ESTÁ EL CAMBIO -->
<td>${user.rol}</td>
<td>
<button class="btn btn-danger btn-sm" onclick="eliminar(${index})">Eliminar</button>
<button class="btn btn-warning btn-sm" onclick="bloquear(${index})">Bloquear</button>
</td>
</tr>
`;
});
}

function eliminar(index){
usuarios.splice(index,1);
localStorage.setItem("usuarios", JSON.stringify(usuarios));
mostrarUsuarios();
}

function bloquear(index){
usuarios[index].bloqueado = true;
localStorage.setItem("usuarios", JSON.stringify(usuarios));
alert("Usuario bloqueado");
}

mostrarUsuarios();

</script>

</body>
</html>
