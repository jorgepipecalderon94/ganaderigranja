<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Venta de Leche</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{ background:#f2f4f8; }
.card{ border-radius: 15px; }
.btn-rounded{ border-radius: 30px; }
</style>
</head>

<body class="p-4">

<div class="d-flex justify-content-between mb-3">
    <div>
        <button class="btn btn-primary" onclick="volver()"> Volver</button>
        <button class="btn btn-danger" onclick="cerrar()"> Cerrar sesión</button>
        
    </div>
    <h3> Venta de Leches</h3>
</div>

<div class="card p-4 shadow">

<form action="guardar_leche.php" method="POST" id="formLeche">

<div class="row mb-3">
    <div class="col-md-4">
        <label>Número de Vaca</label>
        <input type="text" name="numero_devaca" class="form-control" required>
    </div>
    <div class="row mb-3">

    <div class="col-md-2">
        <label>Semana</label>
        <input type="number" name="semana" class="form-control">
    </div>

    <div class="col-md-3">
        <label>Del</label>
        <input type="date" name="fecha_inicio" class="form-control">
    </div>

    <div class="col-md-3">
        <label>Al</label>
        <input type="date" name="fecha_fin" class="form-control">
    </div>

    <div class="col-md-2">
        <label>Mes</label>
        <input type="text" name="mes" class="form-control">
    </div>

    <div class="col-md-2">
        <label>Año</label>
        <input type="number" name="anio" class="form-control">
    </div>

</div>

    <div class="col-md-4">
        <label>Mes</label>
        <select name="mes" class="form-control" required>
            <option value="">Seleccione</option>
            <option>Enero</option>
            <option>Febrero</option>
            <option>Marzo</option>
            <option>Abril</option>
            <option>Mayo</option>
            <option>Junio</option>
            <option>Julio</option>
            <option>Agosto</option>
            <option>Septiembre</option>
            <option>Octubre</option>
            <option>Noviembre</option>
            <option>Diciembre</option>
        </select>
    </div>
</div>

<h5 class="mt-3">🗓️ Litros por día (Semana)</h5>

<!-- NOMBRES DE LOS DÍAS -->
<div class="row text-center fw-bold mb-2">
    <div class="col">Lunes Cant. Lt</div>
    <div class="col">Martes Cant. Lt</div>
    <div class="col">Miércoles Cant. Lt</div>
    <div class="col">Jueves Cant. Lt</div>
    <div class="col">Viernes Cant. Lt</div>
    <div class="col">Sábado Cant. Lt</div>
    <div class="col">Domingo Cant. Lt</div>
</div>

<!-- INPUTS -->
<div class="row mb-3">
    <div class="col"><input type="number" name="lunes" class="form-control dia" value="0"></div>
    <div class="col"><input type="number" name="martes" class="form-control dia" value="0"></div>
    <div class="col"><input type="number" name="miercoles " class="form-control dia" value="0"></div>
    <div class="col"><input type="number" name="jueves" class="form-control dia" value="0"></div>
    <div class="col"><input type="number" name="viernes" class="form-control dia" value="0"></div>
    <div class="col"><input type="number" name="sabado" class="form-control dia" value="0"></div>
    <div class="col"><input type="number" name="domingo" class="form-control dia" value="0"></div>
</div>

<div class="mb-3">
    <label>Total Cant. Lt</label>
    <input type="number" name="total_semanal" id="total" class="form-control" readonly>
</div>

<button type="submit" class="btn btn-success btn-rounded"> Guardar</button>

</form>

<hr>


<button class="btn btn-success" onclick="excel()">📊 Excel</button>
<button class="btn btn-danger" onclick="pdf()">📄 PDF</button>

<table class="table mt-3" id="tabla">
<thead>
<tr>
<th>Vaca</th><th>Mes</th><th>Total</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

// BOTONES
function volver(){ window.location="menu_estudiante.html"; }
function cerrar(){ window.location="ingreso_sistema.html"; }

// TOTAL
document.querySelectorAll(".dia").forEach(i=>{
    i.addEventListener("input", ()=>{
        let t=0;
        document.querySelectorAll(".dia").forEach(x=> t+=Number(x.value));
        document.getElementById("total").value = t;
    });
});

// EXCEL
function excel(){
    let tabla = document.getElementById("tabla");
    let wb = XLSX.utils.table_to_book(tabla);
    XLSX.writeFile(wb,"leche.xlsx");
}

// PDF
function pdf(){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();
    doc.text("Venta de leche",10,10);
    doc.html(document.getElementById("tabla"),{
        callback: function(doc){
            doc.save("leche.pdf");
        }
    });
}

</script>

</body>
</html>
