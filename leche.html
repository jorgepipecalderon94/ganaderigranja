<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Producción de Leche </title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{ background:#eef2f7; }
.card{ border-radius: 15px; }
.table thead{ background:#0d6efd; color:white; }
</style>
</head>

<body class="p-4">

<div class="container">

<h2 class="text-center mb-4">🥛 Producción de Leche </h2>

<!-- FORMULARIO -->
<div class="card p-4 shadow">

<h4>Formulario</h4>

<div class="row" id="campos"></div>

<div class="mt-3">
<label>Total Anual</label>
<input type="number" id="totalAnual" class="form-control" readonly>
</div>

<button class="btn btn-success mt-3" onclick="agregarRegistro()">Guardar</button>

</div>

<!-- TABLA -->
<div class="card mt-4 p-4 shadow">

<h4>Registros Guardados</h4>

<table class="table" id="tablaLeche">
<thead>
<tr id="encabezado"></tr>
</thead>
<tbody></tbody>
</table>

</div>

</div>

<script>

const meses = ["enero","febrero","marzo","abril","mayo","junio",
"julio","agosto","septiembre","octubre","noviembre","diciembre"];

// CREAR CAMPOS
let html="";
meses.forEach((m,i)=>{
html+=`
<div class="col-md-3 mb-3">
<label>${m.toUpperCase()}</label>
<input type="number" id="mes${i}" class="form-control litros" value="0">
</div>`;
});
document.getElementById("campos").innerHTML=html;

// ENCABEZADO TABLA
let head="";
meses.forEach(m=> head+=`<th>${m.toUpperCase()}</th>`);
head+="<th>Total</th>";
document.getElementById("encabezado").innerHTML=head;

// CALCULAR TOTAL
document.addEventListener("input", ()=>{
let total=0;
document.querySelectorAll(".litros").forEach(i=> total+=Number(i.value));
document.getElementById("totalAnual").value=total;
});

// GUARDAR
function agregarRegistro(){

let datos = new FormData();

for(let i=0;i<12;i++){
datos.append(meses[i], document.getElementById("mes"+i).value);
}

datos.append("total", document.getElementById("totalAnual").value);

fetch("guardar.php", {
method:"POST",
body:datos
})
.then(r=>r.text())
.then(r=>{
if(r.trim()=="ok"){
alert("✅ Guardado correctamente");
cargarDatos();
}else{
alert("❌ Error: "+r);
}
});

}

// CARGAR DATOS
function cargarDatos(){
fetch("listar.php")
.then(r=>r.text())
.then(data=>{
document.querySelector("#tablaLeche tbody").innerHTML=data;
});
}

cargarDatos();

</script>

</body>
</html>
