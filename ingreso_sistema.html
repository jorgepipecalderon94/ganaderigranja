<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login Sistema Ganadero</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-4">

<div class="card p-4 shadow">

<h3 class="text-center">Ingreso al Sistema</h3>

<form action="login.php" method="POST">

<!-- CORREO -->
<div class="mb-3">
<label>Correo</label>
<input type="email" name="correo" class="form-control" required>
</div>

<!-- CONTRASEÑA -->
<div class="mb-3">
<label>Contraseña</label>
<input type="password" name="password" id="password" class="form-control" required>
</div>

<!-- MOSTRAR CONTRASEÑA -->
<div class="form-check mt-2">
  <input class="form-check-input" type="checkbox" onclick="mostrarPassword()">
  <label class="form-check-label">Mostrar contraseña</label>
</div>

<div class="text-center mt-3">

<button type="submit" class="btn btn-success w-100">
Ingresar
</button>

<a href="registro_usuario.html" class="btn btn-primary w-100 mt-2">
Registrarse
</a>

</div>

</form>

</div>
</div>
</div>
</div>

<script>
function mostrarPassword(){
  let input = document.getElementById("password");
  if(input.type === "password"){
    input.type = "text";
  } else {
    input.type = "password";
  }
}
</script>

</body>
</html>
