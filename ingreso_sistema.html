<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login Sistema Ganadero</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-4">

<div class="card p-4 shadow">

<h3 class="text-center">Ingreso al Sistema</h3>

<form id="formLogin">

<!-- CORREO -->
<div class="mb-3">
<label>Correo</label>
<input type="email" class="form-control" id="correo" required>
</div>

<!-- CONTRASEÑA -->
<div class="mb-3">
<label>Contraseña</label>
<input type="password" class="form-control" id="password"
required>
</div>

<!-- MOSTRAR CONTRASEÑA -->
<div class="form-check mt-2">
  <input class="form-check-input" type="checkbox" onclick="mostrarPassword()">
  <label class="form-check-label">Mostrar contraseña</label>
</div>

<div class="text-center mt-3">

<button type="submit" class="btn btn-success w-100">
Ingresar
</button>

<a href="registro_usuario.html" class="btn btn-primary w-100 mt-2">
Registrarse
</a>

</div>

</form>

</div>
</div>
</div>
</div>

<script>

// MOSTRAR CONTRASEÑA
function mostrarPassword(){
  let input = document.getElementById("password");
  if(input.type === "password"){
    input.type = "text";
  } else {
    input.type = "password";
  }
}

// LOGIN
document.getElementById("formLogin").addEventListener("submit", function(e){

e.preventDefault();

let correo = document.getElementById("correo").value.trim();
let password = document.getElementById("password").value.trim();

if(correo === "" || password === ""){
    alert("⚠️ Debe llenar todos los campos");
    return;
}

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

let usuarioEncontrado = usuarios.find(u => 
    u.correo === correo && u.password === password
);

if(usuarioEncontrado){

localStorage.setItem("rol", usuarioEncontrado.rol);

// REDIRECCIÓN SEGÚN ROL
if(usuarioEncontrado.rol === "profesor"){
    window.location.href = "menu_profesor.html";
}
else if(usuarioEncontrado.rol === "operario"){
    window.location.href = "menu_operario.html";
}
else if(usuarioEncontrado.rol === "estudiante"){
    window.location.href = "menu_estudiante.html";
}

}else{
    alert(" Usuario no registrado o datos incorrectos");
}

});

</script>

</body>
</html>
