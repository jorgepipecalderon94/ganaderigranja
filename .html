<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Venta de Leche</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f2f4f8;
}
.card{
    border-radius: 15px;
}
.table thead{
    background:#0d6efd;
    color:white;
}
.btn-rounded{
    border-radius: 30px;
}
</style>
</head>

<body class="p-4">

<div class="container">
    <h2 class="text-center mb-4">Registro de Venta de Leche</h2>

    <div class="card p-4 shadow">

        <h4 class="mb-3">Formulario</h4>

        <form id="formLeche">

            <div class="row mb-3">
                <div class="col-md-3">
                    <label>Número de Vaca</label>
                    <input type="text" class="form-control" id="vaca" required>
                </div>
                <div class="col-md-3">
                    <label>Mes</label>
                    <select class="form-control" id="mes">
                        <option>Enero</option>
                        <option>Febrero</option>
                        <option>Marzo</option>
                        <option>Abril</option>
                        <option>Mayo</option>
                        <option>Junio</option>
                        <option>Julio</option>
                        <option>Agosto</option>
                        <option>Septiembre</option>
                        <option>Octubre</option>
                        <option>Noviembre</option>
                        <option>Diciembre</option>
                    </select>
                </div>
            </div>

            <h5>Leche por día (Litros)</h5>

            <div class="row mb-3">
                <div class="col-md-2">
                    <label>Lunes</label>
                    <input type="number" class="form-control dia" id="lunes" min="0" value="0">
                </div>
                <div class="col-md-2">
                    <label>Martes</label>
                    <input type="number" class="form-control dia" id="martes" min="0" value="0">
                </div>
                <div class="col-md-2">
                    <label>Miércoles</label>
                    <input type="number" class="form-control dia" id="miercoles" min="0" value="0">
                </div>
                <div class="col-md-2">
                    <label>Jueves</label>
                    <input type="number" class="form-control dia" id="jueves" min="0" value="0">
                </div>
                <div class="col-md-2">
                    <label>Viernes</label>
                    <input type="number" class="form-control dia" id="viernes" min="0" value="0">
                </div>
                <div class="col-md-2">
                    <label>Sábado</label>
                    <input type="number" class="form-control dia" id="sabado" min="0" value="0">
                </div>
                <div class="col-md-2 mt-2">
                    <label>Domingo</label>
                    <input type="number" class="form-control dia" id="domingo" min="0" value="0">
                </div>
            </div>

            <div class="mb-3">
                <label>Total Litros Semanales</label>
                <input type="number" class="form-control" id="total" readonly>
            </div>

            <button type="button" class="btn btn-primary btn-rounded" onclick="agregarRegistro()">➕ Agregar Registro</button>

        </form>
    </div>

    <div class="card mt-4 p-4 shadow">
        <h4>Registros Guardados</h4>

        <table class="table mt-3" id="tablaLeche">
            <thead>
                <tr>
                    <th>Vaca</th>
                    <th>Mes</th>
                    <th>Lun</th>
                    <th>Mar</th>
                    <th>Mié</th>
                    <th>Jue</th>
                    <th>Vie</th>
                    <th>Sáb</th>
                    <th>Dom</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <button class="btn btn-success btn-rounded me-2" onclick="descargarExcel()">📊 Exportar Excel</button>
        <button class="btn btn-danger btn-rounded" onclick="descargarPDF()">📄 Exportar PDF</button>
    </div>

</div>

<!-- Librerías -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
// Calcular total automáticamente
document.querySelectorAll(".dia").forEach(input => {
    input.addEventListener("input", calcularTotal);
});

function calcularTotal() {
    let total = 0;
    document.querySelectorAll(".dia").forEach(i => total += Number(i.value));
    document.getElementById("total").value = total;
}

// Agregar registro
function agregarRegistro() {
    calcularTotal();

    const tabla = document.querySelector("#tablaLeche tbody");
    const fila = document.createElement("tr");

    fila.innerHTML = `
        <td>${vaca.value}</td>
        <td>${mes.value}</td>
        <td>${lunes.value}</td>
        <td>${martes.value}</td>
        <td>${miercoles.value}</td>
        <td>${jueves.value}</td>
        <td>${viernes.value}</td>
        <td>${sabado.value}</td>
        <td>${domingo.value}</td>
        <td>${total.value}</td>
    `;

    tabla.appendChild(fila);

    document.getElementById("formLeche").reset();
    document.getElementById("total").value = 0;
}

// Exportar a Excel
function descargarExcel(){
    const tabla = document.getElementById("tablaLeche");
    const wb = XLSX.utils.table_to_book(tabla);
    XLSX.writeFile(wb, "Registro_Venta_Leche.xlsx");
}

// Exportar a PDF
function descargarPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text("Registro de Venta de Leche", 10, 10);
    doc.html(document.getElementById("tablaLeche"), {
        callback: function () { doc.save("Registro_Venta_Leche.pdf"); },
        x: 10, y: 20
    });
}
</script>

</body>
</html>
